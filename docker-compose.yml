# Loads variables from a root `.env` file (copy `.env.example` → `.env`).
services:
  postgres:
    image: postgres:12.2-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-nakama}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - data:/var/lib/postgresql/data
    expose:
      - "8080"
      - "5432"
    networks:
      default:
        ipv4_address: 172.20.0.2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 3s
      retries: 5

  nakama:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NAKAMA_DATABASE_ADDRESS=postgres:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB:-nakama}
    restart: unless-stopped
    expose:
      - "7349"
      - "7350"
      - "7351"
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    networks:
      default:
        ipv4_address: 172.20.0.3
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  data:

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
